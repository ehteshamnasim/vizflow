<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>FlowKit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    #app {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script type="module">
    import { WorkflowBuilder } from './src/index.js';
    
    // Initialize workflow builder
    const workflow = new WorkflowBuilder('#app', {
      theme: 'light',
      nodes: [
        // Core workflow nodes
        'trigger', 'action', 'condition', 'loop', 'delay', 'end',
        // Database nodes
        'database', 'mongodb', 'redis',
        // Cloud/AWS nodes
        'aws', 'lambda', 's3',
        // DevOps nodes
        'docker', 'kubernetes', 'github',
        // Code nodes
        'code', 'nodejs', 'python',
        // API/HTTP nodes
        'http', 'webhook', 'api',
        // Communication nodes
        'email', 'slack',
        // Data transformation
        'transform', 'filter', 'merge', 'json',
        // Infrastructure
        'server', 'cloud',
        // Utility nodes
        'note', 'file', 'settings', 'schedule',
        // Simple shapes (flowchart)
        'start', 'stop', 'process', 'decision', 'data', 'document', 'connector', 'subprocess',
        // Visual/Icon nodes
        'image', 'svg', 'icon',
        // Shape nodes
        'circle', 'square', 'diamond', 'hexagon', 'triangle', 'star', 'heart',
        // Status/Indicator nodes
        'success', 'error', 'warning', 'info', 'notification',
        // People nodes
        'user', 'users',
        // Action nodes
        'download', 'upload', 'search', 'link', 'folder', 'trash', 'edit', 'copy', 'refresh',
        // Arrow nodes
        'arrowRight', 'arrowLeft', 'arrowUp', 'arrowDown',
        // Misc icon nodes
        'zap', 'lock', 'unlock', 'key', 'globe', 'home', 'bookmark', 'flag', 'tag', 'layers', 'box', 'cpu', 'activity', 'pieChart', 'barChart'
      ],
      onChange: (data) => console.log('Workflow changed:', data),
      onSave: (data) => console.log('Workflow saved:', data)
    });
    
    // Create example workflow with execution configurations
    setTimeout(() => {
      // Create nodes for main test flow
      const triggerId = workflow.addNode('trigger', 100, 140);
      const actionId = workflow.addNode('action', 350, 140);
      const conditionId = workflow.addNode('condition', 600, 140);
      const successId = workflow.addNode('action', 850, 60);
      const failId = workflow.addNode('action', 850, 220);
      
      // Connect nodes
      workflow.connect(triggerId, actionId);
      workflow.connect(actionId, conditionId);
      workflow.connect(conditionId, successId, 1, 1);  // output_1 (true branch)
      workflow.connect(conditionId, failId, 2, 1);     // output_2 (false branch)
      
      // Configure nodes for execution
      workflow.setNodeConfig(triggerId, {
        triggerType: 'manual',
        initialData: JSON.stringify({ message: 'Hello Workflow!', count: 5, items: ['a', 'b', 'c'] }),
        description: 'Start of the workflow'
      });
      
      workflow.setNodeConfig(actionId, {
        actionType: 'log',
        log_message: 'Processing: {{lastResult.data.message}} (count: {{lastResult.data.count}})'
      });
      
      workflow.setNodeConfig(conditionId, {
        conditionType: 'compare',
        compare_left: '{{lastResult.data.count}}',
        compare_operator: '>',
        compare_right: '3'
      });
      
      workflow.setNodeConfig(successId, {
        actionType: 'log',
        log_message: 'Condition passed! Count is greater than 3'
      });
      
      workflow.setNodeConfig(failId, {
        actionType: 'log',
        log_message: 'Condition failed! Count is 3 or less'
      });
      
      // Create additional example nodes (not connected) to show different configs
      const httpId = workflow.addNode('http', 100, 350);
      workflow.setNodeConfig(httpId, {
        method: 'GET',
        url: 'https://jsonplaceholder.typicode.com/todos/1',
        headers: '{"Accept": "application/json"}',
        timeout_seconds: 30
      });
      
      const emailId = workflow.addNode('email', 350, 350);
      workflow.setNodeConfig(emailId, {
        to: 'user@example.com',
        subject: 'Workflow Notification',
        body: 'The workflow completed with result: {{lastResult.data}}'
      });
      
      const delayId = workflow.addNode('delay', 600, 350);
      workflow.setNodeConfig(delayId, {
        delayType: 'seconds',
        seconds: 2
      });
      
      // FlowKit ready
    }, 300);
    
    window.workflow = workflow;
  </script>
</body>
</html>
